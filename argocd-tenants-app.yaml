apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeplus-wordpress-tenants
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/PatrickBladeeman/wordpress-argocd-tenants
    targetRevision: main
    path: tenants
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
